# Server
server.port=8080
server.address=0.0.0.0

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/blood_donation_db
spring.datasource.username=postgres
spring.datasource.password=Abhijeet@123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=BloodDonationAppSuperSecretKeyThatIsAtLeast256BitsLong2024SecureKey
app.jwt.expiration-ms=86400000

# OTP
app.otp.expiration-minutes=5

# Logging
logging.level.com.blooddonation=DEBUG
logging.level.org.springframework.security=DEBUG
